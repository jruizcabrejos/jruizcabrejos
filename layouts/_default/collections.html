{{ define "main" }}
<article class="collections-page w-full break-words pb-12">
  <section id="collections" class="mx-auto max-w-3xl px-4 py-8">
    <h1 class="mb-3 text-3xl font-bold text-slate-900 dark:text-slate-100">{{ .Title }}</h1>
    {{ with .Params.summary }}
      <p class="mb-8 text-base leading-7 text-slate-600 dark:text-slate-300">{{ . }}</p>
    {{ end }}
    <div class="collections-body prose prose-slate dark:prose-invert">
      {{ .Content }}
    </div>
  </section>
</article>
{{ end }}
